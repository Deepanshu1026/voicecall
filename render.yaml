# Single-service Render blueprint.
# Replace https://voicecall-6ylg.onrender.com with your actual Render URL.
services:
  - type: web
    name: voicecall
    runtime: node
    rootDir: .
    buildCommand: cd backend && npm install && cd ../frontend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://voicecall-6ylg.onrender.com
      - key: SOCKET_CORS_ORIGIN
        value: https://voicecall-6ylg.onrender.com
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: VITE_TURN_SERVER_URL
        sync: false
      - key: VITE_TURN_USERNAME
        sync: false
      - key: VITE_TURN_PASSWORD
        sync: false
